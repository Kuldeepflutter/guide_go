name: guidego
description: A Flutter app for travelers to browse and book guides.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
    

  # 🚀 Supabase (Auth + Database + Storage)
  supabase_flutter: ^2.5.6

  # 🧩 State Management

  image_picker: ^1.1.2
  # 🗺️ Routing
  go_router: ^14.1.4

  # 📅 Date formatting
  intl: ^0.19.0
  provider: ^6.1.2
  razorpay_flutter: ^1.3.6
  google_maps_flutter: ^2.5.0
  geocoding: ^2.1.0 
  geolocator: ^10.1.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.0



  # 💫 Loading indicators
  flutter_spinkit: ^5.2.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.2

  google_fonts: ^6.2.1

  # 🖼️ Image caching
  cached_network_image: ^3.3.1

  # 🎨 Cupertino icons (optional but common)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
flutter_icons:
  android: true
  image_path: "assets/logo.jpg"

flutter:

  uses-material-design: true

  # 🖼️ App Images
  assets:
    - .env
    - assets/
    - assets/images/default_user.png
    - assets/images/default_guide.png
